{{- if .Values.database.backup.enabled }}
---
# CNPG ScheduledBackup — triggers periodic base backups on top of continuous WAL archiving.
# The Cluster resource already enables WAL archiving; this adds scheduled full base backups.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "immich.dbClusterName" . }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-backup
spec:
  schedule: {{ .Values.database.backup.schedule | quote }}
  backupOwnerReference: self
  cluster:
    name: {{ include "immich.dbClusterName" . }}
  # Immediate = take a backup right now when the ScheduledBackup is first created.
  immediate: true
{{- end }}
